<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_self">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado | SeeTech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    .txt:hover { text-decoration: underline; }

    /* Animação fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 1s ease-out forwards;
    }
  </style>
</head>
<body class="font-sans bg-gray-50">

  <!-- Cabeçalho -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center">
        <img src="images/Home/seetech.svg" alt="Logo SeeTech" class="h-10 w-10 rounded-full mr-3">
        <h1 class="text-xl font-bold text-gray-800">SeeTech</h1>
      </div>

      <!-- Menu Desktop -->
      <div class="hidden md:flex space-x-8">
        <a href="index.html#home" class="text-gray-700 hover:text-primary font-medium"><span class="txt">Início</span></a>
        <a href="index.html#services" class="text-gray-700 hover:text-primary font-medium"><span class="txt">Serviços</span></a>
        <a href="index.html#courses" class="text-gray-700 hover:text-primary font-medium"><span class="txt">Cursos</span></a>
        <a href="index.html#about" class="text-gray-700 hover:text-primary font-medium"><span class="txt">Sobre</span></a>
        <a href="index.html#contact" class="text-gray-700 hover:text-primary font-medium"><span class="txt">Contato</span></a>
      </div>
    </nav>
  </header>

  <!-- Conteúdo principal -->
  <main class="flex items-center justify-center min-h-[80vh] text-center px-4">
    <div class="bg-white shadow-md rounded-2xl p-10 max-w-lg fade-in">
      <div class="text-green-500 text-6xl mb-6">
        <i class="fas fa-check-circle"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-4">Mensagem enviada com sucesso!</h1>
      <p class="text-gray-600 mb-8">
        Obrigado por entrar em contato com a <strong>SeeTech</strong>.  
        Nossa equipe retornará em breve para responder sua solicitação.
      </p>
      <a href="index.html#home" 
         class="inline-block bg-primary text-white px-6 py-3 rounded-lg font-medium hover:bg-secondary transition duration-300">
        Voltar ao Início
      </a>
    </div>
  </main>

  <!-- Rodapé -->
  <footer class="bg-gray-800 text-white py-6 text-center">
    <p class="text-gray-400">&copy; 2023 SeeTech Consultoria em TI. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
