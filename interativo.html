<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEE TECH | Cartão Digital</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  
  background: 
    linear-gradient(rgba(47,59,82,0.85), rgba(31,163,184,0.85)),
    url('computers.webp') no-repeat center/cover;

  animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 25px;
  width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);

  transform: translateY(30px);
  animation: slideUp 0.8s ease forwards;
}

@keyframes slideUp {
  to {
    transform: translateY(0);
  }
}

.logo {
  width: 110px;
  margin-bottom: 10px;
}

h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.85;
  margin-bottom: 15px;
}

.name {
  font-weight: bold;
  font-size: 18px;
}

.role {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 20px;
}

.qrcodes {
  display: flex;
  justify-content: space-around;
  margin-bottom: 20px;
}

.qr {
  text-align: center;
  transition: transform 0.3s;
}

.qr:hover {
  transform: scale(1.1);
}

canvas {
  width: 110px !important;
  height: 110px !important;
  border-radius: 10px;
  background: white;
  padding: 5px;
}

.qr p {
  margin-top: 8px;
  font-size: 12px;
}

.socials a {
  margin: 0 8px;
  color: white;
  font-size: 18px;
  transition: 0.3s;
}

.socials a:hover {
  color: #1fa3b8;
}
</style>
</head>

<body>

<div class="card">
  <img src="seetechmini.png" class="logo">

  <h1>SEE TECH</h1>
  <p class="subtitle">Serviços em Informática & Treinamentos</p>

  <p class="name">Eduardo Bacarine Lobato</p>
  <p class="role">CEO & Diretor de Tecnologia</p>

  <div class="qrcodes">
    <div class="qr">
      <canvas id="siteQR"></canvas>
      <p>Website</p>
    </div>

    <div class="qr">
      <canvas id="whatsQR"></canvas>
      <p>WhatsApp</p>
    </div>
  </div>

  <div class="socials">
    <a href="https://www.facebook.com/eblseetech/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.instagram.com/prof_eduardolobato/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.linkedin.com/in/eduardoblobato/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
  </div>

</div>

<script>
QRCode.toCanvas(document.getElementById('siteQR'), 'https://www.seetech.com.br/');
QRCode.toCanvas(document.getElementById('whatsQR'), 'https://api.whatsapp.com/send?l=pt&phone=5511982160046');
</script>

</body>
</html>
